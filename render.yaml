services:
  # Plan gratuito: el servicio se duerme tras 15 min sin tráfico (con ~50s de
  # cold-start al despertar), pero eso ya no borra datos — la base de datos
  # vive en Supabase (Postgres), no en el disco de este contenedor.
  - type: web
    name: gaonerita-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://gaonerita-client.onrender.com,https://gaonerita-staff.onrender.com,https://gaonerita-socios.onrender.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false

  - type: web
    runtime: static
    name: gaonerita-client
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://gaonerita-server.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    runtime: static
    name: gaonerita-staff
    rootDir: staff
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://gaonerita-server.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    runtime: static
    name: gaonerita-socios
    rootDir: socios
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://gaonerita-server.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
