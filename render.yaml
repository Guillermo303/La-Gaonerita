services:
  # Plan gratuito para pruebas: sin disco persistente, así que la base de
  # datos se reinicia con cada redeploy y el servicio se duerme tras 15 min
  # sin tráfico. Antes de usarlo con clientes reales, agregar de vuelta
  # `plan: starter` + el bloque `disk` (ver historial de este archivo) y las
  # variables DB_FILE/BACKUP_DIR apuntando al disco montado.
  - type: web
    name: gaonerita-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://gaonerita-client.onrender.com,https://gaonerita-staff.onrender.com,https://gaonerita-socios.onrender.com
      - key: STRIPE_SECRET_KEY
        sync: false

  - type: web
    runtime: static
    name: gaonerita-client
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://gaonerita-server.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    runtime: static
    name: gaonerita-staff
    rootDir: staff
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://gaonerita-server.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    runtime: static
    name: gaonerita-socios
    rootDir: socios
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://gaonerita-server.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
